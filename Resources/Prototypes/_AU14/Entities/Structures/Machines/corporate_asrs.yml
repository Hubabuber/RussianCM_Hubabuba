# Corporate ASRS — a Weyland-Yutani controlled supply system separate from the colony ASRS.
# Uses faction: "corporate" so department consoles with asrsFaction: "corporate" route orders here.
# Orders placed through a corporate department console have sales tax applied (tax → colony budget).

# Corporate ASRS Console
- type: entity
  parent: CMASRSConsole
  id: AU14CorporateASRSConsole
  name: ent-AU14CorporateASRSConsole
  description: ent-AU14CorporateASRSConsole-desc
  suffix: ent-AU14CorporateASRSConsole-suffix
  components:
  - type: RequisitionsComputer
    faction: corporate
    categories:
    - name: Corporate Equipment
      entries:
      - cost: 500
        crate: RMCCrateElectricalMaintenance
      - cost: 800
        crate: RMCCrateMechanicalMaintenance
      - cost: 1000
        crate: RMCCrateHighCapacityPowerCell
      - cost: 600
        crate: RMCCrateFlashlights
    - name: Civilian Goods
      entries:
      - cost: 400
        crate: RMCCrateFoodMRE
      - cost: 600
        crate: RMCCrateReplacementLights
    - name: Security
      entries:
      - cost: 2000
        crate: RMCCrateInflatableBarriers
      - cost: 1500
        crate: RMCCrateEmptySandbags
      #RuCM change start
    - name: We-Yu Weaponry
      entries:
      - cost: 3000
        crate: AU14CrateM41AMK2
      - cost: 2750
        crate: AU14CrateM240A1
      - cost: 2500
        crate: AU14CrateFP9000
      - cost: 4000
        crate: AU14CrateSSG45
      - cost: 6000
        crate: AU14CrateM5A1SLAW_We-Yu
      - cost: 3250
        crate: AU14CrateM39B2
    - name: We-Yu Ammunition
      entries:
      - cost: 1000
        crate: AU14CrateM41AMK2Ammo
      - cost: 1400
        crate: AU14CrateM240A1Ammo
      - cost: 800
        crate: AU14CrateFP9000Ammo
      - cost: 1200
        crate: AU14CrateSSG45Ammo
      - cost: 1500
        crate: AU14CrateM39B2Ammo
      #RuCM change end
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["AU14AccessCorporateWEYULiaison"], ["AU14AccessCorporateWEYU"]]

# Corporate ASRS Elevator
- type: entity
  parent: CMCargoElevator
  id: AU14CorporateASRSElevator
  name: ent-AU14CorporateASRSElevator
  description: ent-AU14CorporateASRSElevator-desc
  suffix: ent-AU14CorporateASRSElevator-suffix
  components:
  - type: RequisitionsElevator
    faction: corporate
