- type: entity
  abstract: true
  parent: CMBulletBase
  id: CMPelletShotgunBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/bullet_projectiles.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile

- type: entity
  parent: CMPelletShotgunBase
  id: CMPelletShotgunBuckshot
  name: buckshot
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: buckshot
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 50
  - type: CMArmorPiercing
    amount: 5
  - type: ProjectileSpread
    proto: CMPelletShotgunBuckshot
    count: 4
    spread: 13
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 7
      falloff: 9999
      ignoreModifiers: true
    - range: 0
      falloff: 1
  - type: RMCProjectileAccuracy
    thresholds:
    - range: 5
      falloff: 10
  - type: RMCStunOnHit
    stuns:
    - whitelist:
        minMobSize: VerySmallXeno
      maxRange: 6 # TODO RMC14 1.5 if shot from underbarrel shotgun
      slowTime: 2
      superSlowTime: 1
    - whitelist: # TODO RMC14 stamina damage targeted at part
        components:
        - Marine
      maxRange: 5
      slowTime: 2

- type: entity
  parent: CMPelletShotgunBase
  id: CMPelletShotgunSlug
  name: slug
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: beanbag
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 80
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 9
      falloff: 9999
      ignoreModifiers: true
    - range: 0
      falloff: 1
  - type: RMCProjectileAccuracy
    accuracy: 95
    thresholds:
    - range: 6
      falloff: 5
  - type: CMArmorPiercing
    amount: 20
  - type: RMCStunOnHit
    stuns:
    - whitelist:
        minMobSize: VerySmallXeno
      maxRange: 6
      stunTime: 1
      slowTime: 2
      superSlowTime: 1
    - whitelist:
        components:
        - Marine
      maxRange: 7
      stunTime: 1
      slowTime: 2
      superSlowTime: 1

- type: entity
  parent: CMPelletShotgunSlug
  id: CMPelletShotgunIncendiary
  name: incendiary slug
  components:
  - type: Projectile
    damage:
      types:
        Heat: 55
  - type: CMArmorPiercing
    amount: 5
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 12
      falloff: 9999
      ignoreModifiers: true
    - range: 0
      falloff: 1
  - type: RMCProjectileAccuracy
    accuracy: 95
  - type: IgniteOnProjectileHit

- type: entity
  parent: CMPelletShotgunBase
  id: CMPelletShotgunBeanbag
  name: beanbag slug
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: beanbag
      shader: unshaded
  - type: Projectile
    damage: {}
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 12
      falloff: 9999
      ignoreModifiers: true
    - range: 0
      falloff: 1
  - type: RMCStaminaDamageOnCollide
    damage: 45
  - type: RMCProjectileAccuracy
    accuracy: 100

- type: entity
  parent: CMPelletShotgunBase
  id: CMPelletShotgunFlechette
  name: flechette shell
  components:
  - type: CMArmorPiercing
    amount: 25
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: flechette
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 30
  - type: ProjectileSpread
    proto: CMPelletShotgunFlechette
    count: 4
    spread: 6
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 11
      falloff: 9999
      ignoreModifiers: true
    - range: 0
      falloff: 1
  - type: RMCProjectileAccuracy
    accuracy: 90
    thresholds:
    - range: 5
      falloff: 15

- type: entity
  parent: CMPelletShotgunBuckshot
  id: CMPelletShotgunIncendiaryBuckshot
  name: incendiary buckshot shell
  components:
  - type: ProjectileSpread
    proto: CMPelletShotgunIncendiaryBuckshot
    count: 4
    spread: 15
  - type: IgniteOnProjectileHit

- type: entity
  parent: CMPelletShotgunBase
  id: RMCPelletShotgunBreaching
  name: light breaching shell
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: flechette
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Blunt: 55
  - type: CMArmorPiercing
    amount: 5
  - type: ProjectileSpread
    proto: RMCPelletShotgunBreaching
    count: 4
    spread: 8

# RCM, PVE
- type: entity
  parent: CMPelletShotgunBase
  id: RMCPelletShotgunL49B # RMC14 - separate from regular light breaching shells since the XM51 uses a GunDamageModifier to create its breaching effect and the L49 does not.
  name: L49B pellets
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: flechette
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Blunt: 5
        Structural: 200 # RMC14 - required for breaching effect.
  - type: CMArmorPiercing
    amount: 5
  - type: ProjectileSpread
    proto: RMCPelletShotgunL49B
    count: 4
    spread: 8
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 4
      falloff: 9999
      ignoreModifiers: true
    - range: 0
      falloff: 1
