    storedRotation: 0
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Eyes/Glasses/medicalhud.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Eyes/Glasses/medicalhud.rsi
  - type: ItemToggle
    activated: true
    soundActivate:
      path: /Audio/_RMC14/Machines/click.ogg
      params:
        variation: 0.250
    soundDeactivate:
      path: /Audio/_RMC14/Machines/click.ogg
      params:
        variation: 0.250
