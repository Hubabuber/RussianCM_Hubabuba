- type: entity
  parent: RMCGunCaseBase
  id: RuMCUTES-CCase
  name: UTES-C heavy machine gun case
  description: Case for the UTES-C HMG. Contains the gun and 4 magazines.
  components:
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,13,1
    whitelist:
      tags:
      - UTES-CMount
      - RuMCMagazineUTES-C
      - RuMCMagazineUTES-CTracter
      - RMCSkillPamphlet
      - RuMCMachineGunnerRig
  - type: StorageFill
    contents:
    - id: RuMCPamphletHeavyMachineGunner
    - id: RuMCUTES-CMount
    - id: RuMCMagazineUTES-C
    - id: RuMCMagazineUTES-C
    - id: RuMCMagazineUTES-C
    - id: RuMCMagazineUTES-CTracter
    - id: RuMCUPPNavalInfantryBeltMachinegunner

- type: entity
  parent: RMCGunCaseBase
  id: RuMCMachineGunTachankaCase
  name: Tachanka machine gun case
  description: Case for the Tachanka LMG.
  components:
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,13,1
    whitelist:
      tags:
      - RuMCMachineGunTachanka
      - RuMCMagazineTachanka
      - RuMCMagazineTachankaLarge
      - RuMCMagazineTachankaLargeTracer
      - RuMCMachineGunnerRig
  - type: StorageFill
    contents:
    - id: RuMCMachineGunTachanka
    - id: RuMCUPPNavalInfantryBeltMachinegunner

